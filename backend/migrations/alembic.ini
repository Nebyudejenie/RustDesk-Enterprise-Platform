# Alembic Configuration File
# Database Migrations for RustDesk Phase 4

[alembic]
sqlalchemy.url = postgresql://rustdesk_app:rustdesk_password@localhost:5432/rustdesk_db
script_location = .
sqlalchemy.track_modifications = true
version_path_separator = :

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
