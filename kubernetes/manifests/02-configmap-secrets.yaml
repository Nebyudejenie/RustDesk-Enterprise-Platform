---
# RustDesk Kubernetes Phase 2
# ConfigMap and Secrets - Configuration and sensitive data management

---
# ConfigMap: Environment variables and configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: rustdesk-config
  namespace: rustdesk-system
  labels:
    app: rustdesk
    type: config
  annotations:
    description: "RustDesk environment variables and configuration"
data:
  # Server identification
  RUSTDESK_RELAY_HOST: "rustdesk-hbbr.rustdesk-system.svc.cluster.local"
  RUSTDESK_SIGNAL_SERVER: "rustdesk-hbbs.rustdesk-system.svc.cluster.local:21115"
  RUSTDESK_RELAY_SERVER: "rustdesk-hbbr.rustdesk-system.svc.cluster.local:21117"

  # For external access (LoadBalancer IP or DNS)
  # These will be updated based on your load balancer configuration
  RUSTDESK_RELAY_HOST_EXTERNAL: "relay.yourdomain.com"
  RUSTDESK_SIGNAL_SERVER_EXTERNAL: "signal.yourdomain.com:21115"

  # Service ports
  HBBS_PORT_21115: "21115"
  HBBS_PORT_21116: "21116"
  HBBS_PORT_21118: "21118"
  HBBR_PORT_21117: "21117"
  HBBR_PORT_21119: "21119"

  # Unattended access settings
  DISABLE_APPROVAL_PROMPTS: "true"
  DISABLE_PERMISSION_DIALOGS: "true"
  AUTO_ACCEPT_CONNECTIONS: "true"
  DISABLE_LOCK_ON_DISCONNECT: "true"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  LOG_ROTATION_SIZE: "100M"
  LOG_RETENTION_DAYS: "30"

  # Network timeouts
  CONNECTION_TIMEOUT: "30"
  RELAY_TIMEOUT: "300"
  KEEPALIVE_INTERVAL: "60"

  # Kubernetes-specific
  POD_NAME: ""  # Will be populated via downward API
  POD_NAMESPACE: ""  # Will be populated via downward API
  NODE_NAME: ""  # Will be populated via downward API

---
# Secret: Sensitive data
# Create this with: kubectl create secret generic rustdesk-secrets \
#   --from-literal=relay-secret-key='your-secret-key' \
#   --from-literal=permanent-password='your-password' \
#   -n rustdesk-system
apiVersion: v1
kind: Secret
metadata:
  name: rustdesk-secrets
  namespace: rustdesk-system
  labels:
    app: rustdesk
    type: credentials
  annotations:
    description: "RustDesk sensitive credentials"
type: Opaque
stringData:
  # Relay secret key - CHANGE THIS in production
  relay-secret-key: "your-relay-secret-key-change-this-in-production"

  # Permanent password for devices - CHANGE THIS in production
  permanent-password: "POS@Enterprise2024!Secure"

  # Admin token for web console - CHANGE THIS in production
  admin-token: "your-admin-token-change-this-in-production"

---
# Secret: TLS certificates for HTTPS (optional)
# Create this with: kubectl create secret tls rustdesk-tls \
#   --cert=path/to/cert.pem \
#   --key=path/to/key.pem \
#   -n rustdesk-system
#
# This is used if you want to enable HTTPS for the web console
apiVersion: v1
kind: Secret
metadata:
  name: rustdesk-tls
  namespace: rustdesk-system
  labels:
    app: rustdesk
    type: tls
  annotations:
    description: "TLS certificates for HTTPS"
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # tls.crt: base64(certificate)
  # tls.key: base64(private-key)
  tls.crt: ""
  tls.key: ""

---
# Secret: Container registry credentials (if using private registry)
# Create this with: kubectl create secret docker-registry rustdesk-registry \
#   --docker-server=your.registry.com \
#   --docker-username=username \
#   --docker-password=password \
#   -n rustdesk-system
#
# Not needed for public Docker Hub but included for completeness
# apiVersion: v1
# kind: Secret
# metadata:
#   name: rustdesk-registry
#   namespace: rustdesk-system
# type: kubernetes.io/dockercfg
# data:
#   .dockercfg: ""

---
# ConfigMap: RustDesk2.toml for Kubernetes deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: rustdesk-client-config
  namespace: rustdesk-system
  labels:
    app: rustdesk
    config: client
data:
  RustDesk2.toml: |
    [connection]
    relay_host = "rustdesk-hbbr.rustdesk-system.svc.cluster.local"
    relay_port = 21117
    signal_server = "rustdesk-hbbs.rustdesk-system.svc.cluster.local:21115"
    relay_secret = ""
    device_id = "POS-K8S"
    custom_name = "Kubernetes Device"

    [security]
    permanent_password = "POS@Enterprise2024!Secure"
    allow_remote_keyboard_input = true
    allow_remote_mouse_input = true
    allow_file_transfer = true
    ask_on_new_connection = false
    approve_without_consent = true
    accept_all_connections = true
    lock_screen_on_disconnect = false
    require_approval = false

    [auth]
    use_permanent_password = true
    password = "POS@Enterprise2024!Secure"

    [service]
    run_as_service = true
    auto_start = true
    start_on_boot = true

    [advanced]
    encrypted_only = true
    auto_reconnect = true
    use_relay = true

---
# ConfigMap: Prometheus scrape configuration (for metrics)
apiVersion: v1
kind: ConfigMap
metadata:
  name: rustdesk-prometheus-config
  namespace: rustdesk-system
  labels:
    app: rustdesk
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'rustdesk-hbbs'
        static_configs:
          - targets: ['rustdesk-hbbs:21115']

      - job_name: 'rustdesk-hbbr'
        static_configs:
          - targets: ['rustdesk-hbbr:21117']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - rustdesk-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
