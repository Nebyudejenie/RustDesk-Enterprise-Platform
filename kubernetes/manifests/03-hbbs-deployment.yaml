---
# RustDesk Kubernetes Phase 2
# hbbs (Signal Server) Deployment
# High-availability signal server with persistent storage

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustdesk-hbbs
  namespace: rustdesk-system
  labels:
    app: rustdesk
    component: hbbs
    tier: platform
  annotations:
    description: "RustDesk signal server (device registration, key exchange)"
spec:
  # Note: hbbs is a singleton (1 replica) - generates and manages keys
  # For true HA, use StatefulSet or Helm for failover scenarios
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rustdesk
      component: hbbs
  template:
    metadata:
      labels:
        app: rustdesk
        component: hbbs
        tier: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "21115"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rustdesk-sa

      # Affinity rules for HA
      affinity:
        # Pod anti-affinity: spread replicas across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - rustdesk
                    - key: component
                      operator: In
                      values:
                        - hbbs
                topologyKey: kubernetes.io/hostname

        # Node affinity: prefer nodes with specific labels
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - compute
                      - standard

      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 30

      # Security context
      securityContext:
        runAsNonRoot: false  # RustDesk needs root for network binding
        runAsUser: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault

      # Init containers (if needed for setup)
      initContainers: []

      containers:
        - name: hbbs
          image: rustdesk/rustdesk-server-s6:latest
          imagePullPolicy: IfNotPresent

          # Environment variables
          env:
            # From ConfigMap
            - name: RELAY
              valueFrom:
                configMapKeyRef:
                  name: rustdesk-config
                  key: RUSTDESK_RELAY_SERVER

            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: rustdesk-config
                  key: LOG_LEVEL

            # From Secrets
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rustdesk-secrets
                  key: admin-token

            # Kubernetes metadata (downward API)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # Feature flags
            - name: ENCRYPTED_ONLY
              value: "1"

            - name: CONN_DEFAULT_TIMEOUT
              value: "30"

          # Ports
          ports:
            - name: signal
              containerPort: 21115
              protocol: TCP
              hostPort: 21115
            - name: conn-tcp
              containerPort: 21116
              protocol: TCP
              hostPort: 21116
            - name: conn-udp
              containerPort: 21116
              protocol: UDP
              hostPort: 21116
            - name: console
              containerPort: 21118
              protocol: TCP
              hostPort: 21118

          # Volume mounts
          volumeMounts:
            # Persistent storage for keys and database
            - name: hbbs-storage
              mountPath: /root
              readOnly: false
            # Logs
            - name: hbbs-logs
              mountPath: /var/log/rustdesk
              readOnly: false

          # Resource requests and limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          # Liveness probe: is the pod alive?
          livenessProbe:
            httpGet:
              path: /
              port: 21118
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe: is the pod ready to serve traffic?
          readinessProbe:
            tcpSocket:
              port: 21115
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe: has the pod started?
          startupProbe:
            tcpSocket:
              port: 21115
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # Up to 150 seconds (30 * 5)

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Graceful shutdown delay

      volumes:
        - name: hbbs-storage
          persistentVolumeClaim:
            claimName: rustdesk-hbbs-pvc
        - name: hbbs-logs
          emptyDir: {}

      # Pod disruption budget (avoid disruption during updates)
      # See 05-pod-disruption-budget.yaml

      # DNS policy
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always

---
# Service: Expose hbbs internally
apiVersion: v1
kind: Service
metadata:
  name: rustdesk-hbbs
  namespace: rustdesk-system
  labels:
    app: rustdesk
    component: hbbs
  annotations:
    description: "RustDesk signal server service"
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for direct pod access
  selector:
    app: rustdesk
    component: hbbs
  ports:
    - name: signal
      port: 21115
      targetPort: 21115
      protocol: TCP
    - name: conn-tcp
      port: 21116
      targetPort: 21116
      protocol: TCP
    - name: conn-udp
      port: 21116
      targetPort: 21116
      protocol: UDP
    - name: console
      port: 21118
      targetPort: 21118
      protocol: TCP
  sessionAffinity: None
